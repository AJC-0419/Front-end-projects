<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Me!</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap" rel="stylesheet">
</head>
<body>
    <div id = "header">
        <h3>FOCUS ME</h3>
    </div>
    <main>
        <div id = "To-do" class = "main-boxes">
            <h1>To-do's</h1>
            <div id = "tdbox" class="sd">

                </div>
                <div id="add">
                    <div>
                        <h2>Add a Task</h2>
                    </div>
                    
                </div>
            </div>
        </div>
         <div id = "Timer" class = "main-boxes">
            <h1>Timer</h1>
            <div id = "tbox" class="sd time">
                <div id="tdisplay" class = "boxdiv">
                    <div>
                        <button class ="up" onclick="addNum('num1')">↑</button>
                        <h1 id ="num1">00</h1>
                        <button class ="down" onclick="subNum('num1')">↓</button>
                        <p>hour/s</p>
                    </div>
                    <div class="spacing">
                        <h1>:</h1>
                    </div>
                   <div>
                        <button class ="up" onclick="addNum('num2')">↑</button>
                        <h1 id ="num2">00</h1>
                        <button class ="down"  onclick="subNum('num2')">↓</button>
                        <p>minute/s</p>
                    </div>
                     <div class="spacing">
                        <h1>:</h1>
                    </div>
                    <div>
                        <button class ="up" onclick="addNum('num3')">↑</button>
                        <h1 id ="num3">00</h1>
                        <button class ="down"  onclick="subNum('num3')">↓</button>
                         <p>second/s</p>
                    </div>
                </div>
                <div id ="timer_sub">
                    <button type="submit" >Set Timer</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
