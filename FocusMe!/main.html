<html lang="en">
<head>

<body>
    <div id = "header">
        <h3>FOCUS ME<h3>
    </div>
    <main>
        <div id = "To-do" class = "main-boxes">

            <div id = "tdbox" class="sd">

                </div>

                    </div>
                    <div>
                        <h1>&nbsp</h1>

                    </div>
                    <div>
                        <h1>↑</h1>
                        <h1>00</h1>
                        <h1>↓</h1>
                    </div>
                    <div>
                        <h1>&nbsp</h1>
                        <h1>:</h1>
                        <h1>&nbsp</h1>
                    </div>
                    <div>
                        <h1>↑</h1>
                        <h1>00</h1>
                        <h1>↓</h1>
                    </div>
                </div>
            </div>
            <div id = "tbox_song" class="sd time">
            </div>
        </div>
    </main>
    <script src="script.js"></script>
